version: '3.8'

services:
  db:
    ports:
      - "5433:5432"

  backend:
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/.venv

  frontend:
    build:
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ../Frontend-LLMTestHelper/llm-test-helper-front:/app
      - /app/node_modules